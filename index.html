<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MK Planner</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#122C4F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MK Planner" />
    <style>
      #install-banner {
        display: none;
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: #122C4F;
        color: #FBF9E4;
        border: 2px solid #5B88B2;
        border-radius: 12px;
        padding: 0.75rem 1.5rem;
        z-index: 9999;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        gap: 1rem;
        font-family: inherit;
        font-size: 0.95rem;
      }
      #install-banner.hidden { display: none !important; }
      #btn-install {
        background: #5B88B2;
        color: #FBF9E4;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1.2rem;
        cursor: pointer;
        font-weight: bold;
        font-size: 0.9rem;
        white-space: nowrap;
      }
      #btn-install:hover { background: #FBF9E4; color: #122C4F; }
      #btn-install-close {
        background: none;
        border: none;
        color: #FBF9E4;
        cursor: pointer;
        font-size: 1.2rem;
        line-height: 1;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="palette-grid">
        <article class="tile tile-midnight">
          <header class="tile-head">
            <span class="tile-code">#122C4F</span>
            <h1>Midnight</h1>
            <p>Schedule</p>
            <button type="button" class="tile-open js-open-tile" aria-expanded="false">Ouvrir</button>
          </header>
          <div class="tile-body">
            <button type="button" class="tile-close js-close-tile">← Retour</button>
            <div id="week-list" class="week-list"></div>
          </div>
        </article>

        <article class="tile tile-pearl">
          <header class="tile-head">
            <span class="tile-code">#FBF9E4</span>
            <h2>Pearl Perfect</h2>
            <p>Habitude tracker</p>
            <button type="button" class="tile-open js-open-tile" aria-expanded="false">Ouvrir</button>
          </header>
          <div class="tile-body">
            <button type="button" class="tile-close js-close-tile">← Retour</button>
            <form id="habit-form" class="mini-form">
              <input id="habit-name" type="text" placeholder="Ajouter une habitude" required />
              <button type="submit">Ajouter</button>
            </form>
            <ul id="habit-list" class="tile-list"></ul>
          </div>
        </article>

        <article class="tile tile-noir">
          <header class="tile-head">
            <span class="tile-code">#000000</span>
            <h2>Noir</h2>
            <p>Projet</p>
            <button type="button" class="tile-open js-open-tile" aria-expanded="false">Ouvrir</button>
          </header>
          <div class="tile-body">
            <button type="button" class="tile-close js-close-tile">← Retour</button>
            <form id="project-form" class="mini-form">
              <input id="project-name" type="text" placeholder="Ajouter un projet" required />
              <button type="submit">Ajouter</button>
            </form>
            <ul id="project-list" class="tile-list"></ul>
          </div>
        </article>

        <article class="tile tile-ocean">
          <header class="tile-head">
            <span class="tile-code">#5B88B2</span>
            <h2>Ocean</h2>
            <p>Progression</p>
            <button type="button" class="tile-open js-open-tile" aria-expanded="false">Ouvrir</button>
          </header>
          <div class="tile-body">
            <button type="button" class="tile-close js-close-tile">← Retour</button>
            <div class="progress-group">
              <div class="progress-head">
                <span>Schedule</span>
                <strong id="schedule-progress-text">0%</strong>
              </div>
              <div class="progress-track"><div id="schedule-progress-fill" class="progress-fill"></div></div>
            </div>
            <div class="progress-group">
              <div class="progress-head">
                <span>Habitudes</span>
                <strong id="habit-progress-text">0%</strong>
              </div>
              <div class="progress-track"><div id="habit-progress-fill" class="progress-fill habit"></div></div>
            </div>
            <div class="progress-group">
              <div class="progress-head">
                <span>Projets</span>
                <strong id="project-progress-text">0%</strong>
              </div>
              <div class="progress-track"><div id="project-progress-fill" class="progress-fill project"></div></div>
            </div>
            <div class="progress-group">
              <div class="progress-head">
                <span>Progression totale</span>
                <strong id="total-progress-text">0%</strong>
              </div>
              <div class="progress-track"><div id="total-progress-fill" class="progress-fill total"></div></div>
            </div>
            <div class="progress-group">
              <div class="progress-head">
                <span>Schedule bar</span>
              </div>
              <div id="schedule-bar" class="schedule-bar"></div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <!-- Install / Download banner -->
    <div id="install-banner" class="hidden" role="banner" aria-label="Installer l'application">
      <span>📲 Installer MK Planner comme appli</span>
      <button id="btn-install" type="button">⬇️ Télécharger l'app</button>
      <button id="btn-install-close" type="button" aria-label="Fermer">×</button>
    </div>

    <template id="habit-item-template">
      <li class="item-row">
        <label class="item-main">
          <input type="checkbox" class="js-habit-check" />
          <span class="js-habit-label"></span>
        </label>
        <button class="danger js-delete-habit" type="button">×</button>
      </li>
    </template>
    <template id="project-item-template">
      <li class="item-row">
        <label class="item-main">
          <input type="checkbox" class="js-project-check" />
          <span class="js-project-label"></span>
        </label>
        <button class="danger js-delete-project" type="button">×</button>
      </li>
    </template>

    <script src="app.js"></script>
    <script>
      // PWA: Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(console.error);
        });
      }

      // PWA: Show install banner
      let deferredPrompt;
      const banner = document.getElementById('install-banner');
      const btnInstall = document.getElementById('btn-install');
      const btnClose = document.getElementById('btn-install-close');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        banner.classList.remove('hidden');
      });

      btnInstall.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
        }
        banner.classList.add('hidden');
      });

      btnClose.addEventListener('click', () => {
        banner.classList.add('hidden');
      });

      // Hide banner if already installed
      window.addEventListener('appinstalled', () => {
        banner.classList.add('hidden');
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
